services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: airbnb-api
    image: airbnb-api:latest
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./src:/app/src
      - ./models:/app/models
      - ./artifacts:/app/artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/docs', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: sync
          path: ./models
          target: /app/models
        - action: sync
          path: ./artifacts
          target: /app/artifacts
        - action: rebuild
          path: ./requirements.txt
    command: python -m uvicorn src.api:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
